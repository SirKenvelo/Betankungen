# CREATED: 2026-03-11
# UPDATED: 2026-03-11
name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (FPC + sqlite3)
        run: |
          sudo apt-get update
          # Vollstaendiges FPC-Set statt nur Compiler, damit FCL/IniFiles und DB-Units vorhanden sind.
          sudo apt-get install -y fpc sqlite3

      - name: Build (FPC standard)
        run: |
          mkdir -p bin build units
          fpc -Mobjfpc -Sh -gl -gw -FEbin -FUbuild -Fuunits src/Betankungen.lpr

      - name: Domain-Policy suite
        run: |
          tests/domain_policy/run_domain_policy_tests.sh

      - name: Smoke suite (--modules)
        run: |
          tests/smoke/smoke_cli.sh --modules

      - name: Clean-home smoke suite (--modules)
        run: |
          tests/smoke/smoke_clean_home.sh --modules
