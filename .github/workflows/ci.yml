# CREATED: 2026-03-11
# UPDATED: 2026-03-13
name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sprint/Docs lint
        run: |
          scripts/sprint_docs_lint.sh

      - name: Tracker lint
        run: |
          scripts/projtrack_lint.sh

      - name: Install dependencies (FPC + sqlite3)
        run: |
          sudo apt-get update
          # Vollstaendiges FPC-Set statt nur Compiler, damit FCL/IniFiles und DB-Units vorhanden sind.
          sudo apt-get install -y fpc sqlite3

      - name: Build (FPC standard)
        run: |
          mkdir -p bin build units
          fpc -Mobjfpc -Sh -gl -gw -FEbin -FUbuild -Fuunits src/Betankungen.lpr

      - name: Export-Contract JSON check
        run: |
          tests/regression/run_export_contract_json_check.sh

      - name: Domain-Policy suite
        run: |
          tests/domain_policy/run_domain_policy_tests.sh

      - name: Prepare smoke fixtures
        run: |
          mkdir -p .releases .backup
          # smoke_cli -> backup_snapshot --dry-run erwartet ein Betankungen_*.tar in .releases
          tar -cf .releases/Betankungen_0_0_0_ci_smoke.tar docs/README.md

      - name: Smoke suite (--modules)
        run: |
          tests/smoke/smoke_cli.sh --modules

      - name: Clean-home smoke suite (--modules)
        run: |
          tests/smoke/smoke_clean_home.sh --modules
